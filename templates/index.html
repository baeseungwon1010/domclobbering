<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>당신의 HTML을 평가합니다</title>
    <style>
        body { font-family: sans-serif; margin: 30px; }
        .container { max-width: 900px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 10px; min-height: 80px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        textarea { width: 100%; min-height: 120px; }
    </style>
</head>
<body>
<div class="container">
    <h1>당신의 HTML을 평가해드립니다</h1>
    <p>`?content=...` 파라미터로 전달된 HTML을 우측에 렌더링하고,<br>
       아래 폼을 통해 랜덤한 점수를 부여합니다.</p>

    <form name="randomForm" action="/submit" method="POST">
        <div class="row" style="margin-top: 20px;">
            <div>
                <h3>설명</h3>
                <div class="box">
                    <p>당신의 HTML을 평가합니다. 평가 점수가 <strong>100000점</strong>일 때만 제출됩니다.</p>
                    <p>제출에 성공하면 특별한 보상을 드립니다.</p>
                </div>
            </div>
            <div>
                <h3>당신의 HTML</h3>
                <div id="content" class="box"></div>
            </div>
        </div>

        <input type="text" name="userName" placeholder="이름 입력" style="margin-top: 20px;">
        <input type="hidden" name="randomKey" id="randomKey">

        <button type="button" onclick="sendForm()">전송하기</button>
    </form>

    <script>
    (function () {
        const usp = new URLSearchParams(window.location.search);
        const raw = usp.get('content') || '';
        const out = document.getElementById('content');
        out.innerHTML = raw;
    })();

    function sendForm() {
        const form = document.randomForm;
        var submitVal = form.submit;
        var is100000 = (submitVal && submitVal.value != null && Number(submitVal.value) === 100000);

        if (!is100000) {
            alert("평가 점수가 100000점일 때만 제출할 수 있습니다.");
            return;
        }

        document.getElementById('randomKey').value = "100000000";
        HTMLFormElement.prototype.submit.call(form);
    }
    </script>
</div>
</body>
</html>
